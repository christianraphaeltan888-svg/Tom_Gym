<!DOCTYPE html>
<html>
<head>
  <title>TomGym</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ff88">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0b0b0b;
      color: #fff;
      margin: 0;
      padding: 15px;
    }

    .title {
      color: #00ff88;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      background: #161616;
      color: #fff;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      background: #00ff88;
      font-weight: bold;
      font-size: 16px;
      color: #000;
    }

    button:active {
      transform: scale(0.97);
    }

    h3 {
      margin-top: 25px;
      color: #00ff88;
      font-size: 20px;
    }

    .item {
      background: #161616;
      padding: 15px;
      margin-top: 10px;
      border-radius: 12px;
    }

    button.small {
      width: auto;
      padding: 8px 12px;
      margin-right: 5px;
      margin-top: 10px;
      background: #2a2a2a;
      color: #fff;
      font-size: 13px;
    }

    hr {
      border: none;
      border-top: 1px solid #222;
      margin: 20px 0;
    }
  </style>
</head>

<body>

<h2 class="title">🏋️ TomGym</h2>

<input type="date" id="date">
<input type="text" id="exercise" placeholder="Latihan (Bench Press)">
<input type="number" id="weight" placeholder="Beban (kg)">
<input type="number" id="reps" placeholder="Reps">
<button onclick="save()">Simpan</button>

<hr>

<input type="text" id="search" placeholder="Cari latihan..." oninput="searchExercise()">
<div id="maxResult"></div>

<select id="monthFilter" onchange="render()"></select>

<h3>📊 Statistik Latihan</h3>
<div id="stats"></div>

<h3>📊 Chart Progress</h3>

<select id="exerciseFilter" onchange="render()"></select>

<select id="rangeFilter" onchange="render()">
  <option value="7">1 Minggu</option>
  <option value="30" selected>1 Bulan</option>
  <option value="365">1 Tahun</option>
</select>

<canvas id="chart"></canvas>

<h3>📅 Riwayat</h3>
<div id="list"></div>

<script>
let data = JSON.parse(localStorage.getItem("tomgym")) || [];
let editIndex = null;
let chart;

let date = document.getElementById("date");
let exercise = document.getElementById("exercise");
let weight = document.getElementById("weight");
let reps = document.getElementById("reps");
let search = document.getElementById("search");
let maxResult = document.getElementById("maxResult");
let monthFilter = document.getElementById("monthFilter");
let stats = document.getElementById("stats");
let exerciseFilter = document.getElementById("exerciseFilter");
let rangeFilter = document.getElementById("rangeFilter");

function save(){
  let item = {
    date: date.value,
    exercise: exercise.value,
    weight: parseFloat(weight.value),
    reps: parseInt(reps.value)
  };

  if(!item.date || !item.exercise || !item.weight || !item.reps){
    alert("Isi semua data!");
    return;
  }

  if(editIndex !== null){
    data[editIndex] = item;
    editIndex = null;
  } else {
    data.push(item);
  }

  localStorage.setItem("tomgym", JSON.stringify(data));
  render();
}

function editData(i){
  let d = data[i];
  date.value = d.date;
  exercise.value = d.exercise;
  weight.value = d.weight;
  reps.value = d.reps;
  editIndex = i;
}

function deleteData(i){
  if(confirm("Hapus data ini?")){
    data.splice(i,1);
    localStorage.setItem("tomgym", JSON.stringify(data));
    render();
  }
}

function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  let month = monthFilter.value;

  let filtered = data.filter(d => {
    if(!month) return true;
    return d.date.startsWith(month);
  });

  updateExerciseFilter();

  filtered.forEach((d,i) => {
    list.innerHTML += `
      <div class="item">
        <b>${d.date}</b><br>
        ${d.exercise}<br>
        ${d.weight}kg x ${d.reps}<br><br>
        <button class="small" onclick="editData(${i})">Edit</button>
        <button class="small" onclick="deleteData(${i})">Hapus</button>
      </div>
    `;
  });

  updateChart(filtered);
  updateMonths();
  updateStats();
}

function updateMonths(){
  let months = [...new Set(data.map(d => d.date.slice(0,7)))];

  monthFilter.innerHTML =
    `<option value="">Semua Bulan</option>` +
    months.map(m => `<option value="${m}">${m}</option>`).join("");
}

function updateExerciseFilter(){
  let ex = [...new Set(data.map(d => d.exercise))];

  exerciseFilter.innerHTML =
    `<option value="">Semua Gerakan</option>` +
    ex.map(e => `<option value="${e}">${e}</option>`).join("");
}

function searchExercise(){
  let keyword = search.value.toLowerCase();
  let filtered = data.filter(d => d.exercise.toLowerCase().includes(keyword));

  if(filtered.length === 0){
    maxResult.innerHTML = "Tidak ditemukan";
    return;
  }

  let max = Math.max(...filtered.map(d => d.weight));
  maxResult.innerHTML = `🔥 PR Beban Tertinggi: ${max} kg`;
}

function updateStats(){
  if(data.length === 0){
    stats.innerHTML = "Belum ada data";
    return;
  }

  let count = {};

  data.forEach(d => {
    count[d.exercise] = (count[d.exercise] || 0) + 1;
  });

  let sorted = Object.entries(count).sort((a,b) => b[1] - a[1]);

  let most = sorted[0];
  let least = sorted[sorted.length - 1];

  stats.innerHTML = `
    🥇 <b>Paling sering:</b> ${most[0]} (${most[1]}x)<br>
    🧊 <b>Paling jarang:</b> ${least[0]} (${least[1]}x)
  `;
}

function updateChart(filtered){
  let selectedExercise = exerciseFilter.value;
  let range = parseInt(rangeFilter.value);
  let now = new Date();

  let filteredData = filtered.filter(d => {
    if(selectedExercise && d.exercise !== selectedExercise){
      return false;
    }

    let dateObj = new Date(d.date);
    let diffDays = (now - dateObj) / (1000 * 60 * 60 * 24);

    return diffDays <= range;
  });

  let grouped = {};

  filteredData.forEach(d => {
    grouped[d.date] = Math.max(grouped[d.date] || 0, d.weight);
  });

  let labels = Object.keys(grouped).sort();
  let values = labels.map(l => grouped[l]);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: selectedExercise ? 
          `Progress ${selectedExercise}` : 
          'Progress Beban',
        data: values,
        borderColor: '#00ff88',
        backgroundColor: '#00ff8844',
        tension: 0.3
      }]
    }
  });
}

render();

// REGISTER SERVICE WORKER
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
